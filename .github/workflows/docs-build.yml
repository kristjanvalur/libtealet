name: docs-build

on:
  pull_request:
  push:
    branches:
      - master
      - experiment/doxygen-awesome-css
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install docs toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Build docs
        run: make docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: doxygen-html
          path: docs/_build/doxygen/html
          if-no-files-found: error
