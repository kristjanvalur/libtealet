name: build and test

on:
  push:
    branches: [ master, dev ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: check version metadata sync
      run: make check-version-sync

    - name: refresh apt package index
      run: sudo apt-get update

    - name: install clang-format-14
      run: sudo apt-get install -o Acquire::Retries=3 --fix-missing --no-install-recommends -y clang-format-14

    - name: show clang-format version
      run: clang-format-14 --version

    - name: check formatting
      run: make check-format CLANG_FORMAT=clang-format-14

  build-linux-gnu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: [AMD64, i386, arm, aarch64, riscv64]
        include:
          - name: i386
            platformflags: -m32
          - name: arm
            platformtools: arm-linux-gnueabi
            emulator: qemu-arm -L /usr/arm-linux-gnueabi
          - name: aarch64
            platformtools: aarch64-linux-gnu
            emulator: qemu-aarch64 -L /usr/aarch64-linux-gnu
          - name: riscv64
            platformtools: riscv64-linux-gnu
            emulator: qemu-riscv64 -L /usr/riscv64-linux-gnu
    
    env:
      TEALET_WITH_TESTING: 1
      PLATFORMFLAGS: ${{matrix.platformflags}}
      PLATFORM_PREFIX: ${{matrix.platformtools}}
      EMULATOR: ${{matrix.emulator}}
    
    steps:
    - uses: actions/checkout@v6

    - name: refresh apt package index
      run: sudo apt-get update
    
    - name: install multilib
      run: sudo apt-get install -o Acquire::Retries=3 --fix-missing --no-install-recommends -y gcc-multilib g++-multilib
      if: ${{ matrix.name == 'i386' }}
    
    - name: install qemu
      if: matrix.emulator
      run: sudo apt-get install -o Acquire::Retries=3 --fix-missing --no-install-recommends -y qemu-user
    
    - name: install abi lib
      if: matrix.platformtools
      run: sudo apt-get install -o Acquire::Retries=3 --fix-missing --no-install-recommends -y gcc-${{matrix.platformtools}} g++-${{matrix.platformtools}}
    
    - name: make
      run: make all
    
    - name: test
      run: make test
    
    - name: set abi name
      run: echo abiname=$(make abiname) >> $GITHUB_ENV
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: libtealet-${{ env.abiname }}
        path: |
          bin/libtealet.a
          bin/libtealet.so
  
  sanitizer-tests:
    runs-on: ubuntu-latest
    env:
      TEALET_WITH_TESTING: 1
    steps:
    - uses: actions/checkout@v6

    - name: refresh apt package index
      run: sudo apt-get update
    
    - name: Install Valgrind
      run: sudo apt-get install -o Acquire::Retries=3 --fix-missing --no-install-recommends -y valgrind
    
    - name: Build library
      run: make all
    
    - name: Run UBSan tests
      run: make test-ubsan
    
    - name: Run Valgrind tests
      run: make test-valgrind
  
  build-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-latest]
        include:
          - os: macos-15-intel
            abi: darwin_x86_64
          - os: macos-latest
            abi: darwin_arm64
    env:
      TEALET_WITH_TESTING: 1
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Build library
      run: make all
    
    - name: Run tests
      run: make test
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: libtealet-${{ matrix.abi }}
        path: |
          bin/libtealet.a
          bin/libtealet.so
  
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [Win32, x64, ARM64]
        include:
          - platform: Win32
            folder: Win32
            abi: win_x86
            native: yes
          - platform: x64
            folder: x64
            abi: win_x64
            native: yes
          - platform: ARM64
            folder: ARM64
            abi: win_arm64
    env:
      CL: /DTEALET_WITH_TESTING=1
    
    steps:
    - uses: actions/checkout@v6
    
    - uses: microsoft/setup-msbuild@v3
    
    - name: build
      run: msbuild.exe VS\tealet.sln /p:Platform=${{matrix.platform}}
    
    - name: test
      if: ${{ matrix.native == 'yes' }}
      run: .\VS\${{matrix.folder}}\Debug\test.exe
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: libtealet-${{ matrix.abi }}
        path: |
          VS\${{matrix.folder}}\Debug\tealet.lib
          VS\${{matrix.folder}}\Debug\tealet.dll
  
  create-release:
    runs-on: ubuntu-latest
    needs: [format-check, build-linux-gnu, build-macos, build-windows, sanitizer-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts
    
    - name: Create release archive
      run: |
        mkdir -p release/lib
        
        # Copy libraries maintaining the lib/{abi}/ structure
        cp -r artifacts/libtealet-sysv_amd64 release/lib/sysv_amd64
        cp -r artifacts/libtealet-sysv_i386 release/lib/sysv_i386
        cp -r artifacts/libtealet-arm32 release/lib/arm32
        cp -r artifacts/libtealet-aarch64 release/lib/aarch64
        cp -r artifacts/libtealet-riscv64 release/lib/riscv64
        cp -r artifacts/libtealet-darwin_x86_64 release/lib/darwin_x86_64
        cp -r artifacts/libtealet-darwin_arm64 release/lib/darwin_arm64
        cp -r artifacts/libtealet-win_x86 release/lib/win_x86
        cp -r artifacts/libtealet-win_x64 release/lib/win_x64
        cp -r artifacts/libtealet-win_arm64 release/lib/win_arm64
        
        # Copy headers, stackman, and documentation
        mkdir -p release/tealet
        cp src/tealet.h release/tealet/
        cp src/tealet_extras.h release/tealet/
        cp -r stackman release/
        cp Makefile README.md LICENSE release/
        
        # Create version-specific archive
        VERSION=${GITHUB_REF#refs/tags/v}
        cd release
        tar -czf ../libtealet-${VERSION}.tar.gz .
        cd ..
        
    - name: Extract version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: libtealet-${{ steps.get_version.outputs.VERSION }}.tar.gz
        generate_release_notes: true
